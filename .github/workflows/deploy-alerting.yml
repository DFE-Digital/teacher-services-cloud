name: Deploy Alerting

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
          - test

  push:
    branches:
      - main
    paths:
      - 'alerting/**'
  pull_request:
    branches:
      - main
    types:
      - labeled
      - synchronize
      - reopened
      - opened
      - converted_to_draft
    paths:
      - 'alerting/**'

jobs:
  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Validate alerting/terraform_logic_app
      uses: ./.github/actions/validate-terraform
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        terraform_root_folder: alerting/terraform_logic_app
        terraform_modules_tag: main

    - name: Validate alerting/terraform_action_group
      uses: ./.github/actions/validate-terraform
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        terraform_root_folder: alerting/terraform_action_groups
        terraform_modules_tag: main

    - name: Notify teams channel on job failure
      if: ${{ failure() && github.ref == 'refs/heads/main' }}
      uses: DFE-Digital/github-actions/send-to-teams-channel@master
      with:
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: Deploy Alerting
        service: Teacher Services Cloud
        message: |
          terraform alerting validation failed

  deploy:
    name: Deploy Alerting
    if: github.ref == 'refs/heads/main'
    concurrency: deploy_${{ matrix.environment }}
    environment:
      name: ${{ matrix.environment }}
    needs: [validate-terraform]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        environment: [development, test]
    permissions:
      id-token: write # Required for OIDC authentication to Azure

    steps:
    - uses: actions/checkout@v6

    - uses: Azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.terraform_version }}
        terraform_wrapper: false

    - id: terraform
      run: |
        make ci ${{ matrix.environment }} alerting-apply

        cd alerting/terraform_logic_app
        TFOUTPUTS=$(terraform output --json)
        OUTPUTS=($(jq -r <<< "$TFOUTPUTS" | jq -r 'keys | @sh' | tr -d \'))
        for o in "${OUTPUTS[@]}"
        do
          echo ${o}=$(jq -r .${o}.value <<< "$TFOUTPUTS") >> $GITHUB_ENV
        done
      shell: bash

    - name: Notify teams channel on job failure
      if: ${{ failure() }}
      uses: DFE-Digital/github-actions/send-to-teams-channel@master
      with:
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: Deploy Alerting
        service: Teacher Services Cloud
        message: |
          The alerting  deployment to ${{ matrix.environment }} has failed

    - name: Notify teams channel on workflow success
      uses: DFE-Digital/github-actions/send-to-teams-channel@master
      with:
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: Deploy Alerting
        service: Teacher Services Cloud
        status: good
        minimal: true
        message: |
          An alerting deployment to ${{ matrix.environment }} has completed successfully

  manual_deploy:
    name: Manual Deploy Alerting
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: ${{ inputs.environment }}
    needs: [validate-terraform]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication to Azure

    steps:
    - uses: actions/checkout@v6

    - uses: Azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.terraform_version }}
        terraform_wrapper: false

    - id: terraform
      run: |
        make ci ${{ inputs.environment }} alerting-apply

        cd alerting/terraform_logic_app
        TFOUTPUTS=$(terraform output --json)
        OUTPUTS=($(jq -r <<< "$TFOUTPUTS" | jq -r 'keys | @sh' | tr -d \'))
        for o in "${OUTPUTS[@]}"
        do
          echo ${o}=$(jq -r .${o}.value <<< "$TFOUTPUTS") >> $GITHUB_ENV
        done
      shell: bash

    - name: Notify teams channel on job failure
      if: ${{ failure() }}
      uses: DFE-Digital/github-actions/send-to-teams-channel@master
      with:
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: Deploy Alerting
        service: Teacher Services Cloud
        message: |
          The alerting deployment to ${{ inputs.environment }} has failed

    - name: Notify teams channel on workflow success
      uses: DFE-Digital/github-actions/send-to-teams-channel@master
      with:
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: Deploy Alerting
        service: Teacher Services Cloud
        status: good
        minimal: true
        message: |
          An alerting deployment to ${{ inputs.environment }} has completed successfully
