name: Mirror DockerHub Images to GHCR

on:
    workflow_dispatch:
    schedule:
      - cron: "0 6 * * 0"  # Weekly on Sundays at 06:00 UTC
    push:
      branches:
        - 2366-spike-logging-workflow-runs

permissions:
  contents: read
  packages: write
  id-token: write



jobs:
    mirror:
        runs-on: ubuntu-latest
        environment: development
        env:
          MY_ENV: development
        steps:

          - name: Checkout code
            uses: actions/checkout@v4

          - name: build base Logit json payload
            run: |
              cat > payload_base.json <<'JSON'
              {
                "labels": { "workflow-purpose": "deployment" },
                "host": { "name": "github.com" },
                "logtype": "custom",
                "event": {
                  "category": "ci",
                  "type": "pipeline",
                  "action": "${{ github.action }}",
                  "environment": "${{ env.MY_ENV }}"
                },
                "user": { "name": "${{ github.actor }}" },
                "ci": {
                  "pipeline_id": "${{ github.run_id }}",
                  "job_name": "${{ github.job }}",
                  "workflow_name": "${{ github.workflow }}",
                  "run_id": "${{ github.run_id }}"
                },
                "git": {
                  "branch": "${{ github.ref }}",
                  "commit": {
                    "id": "${{ github.sha }}",
                    "message": "${{ github.event.head_commit.message }}"
                  }
                },
                "repository": {
                  "name": "${{ github.repository }}"
                }
              }
              JSON

          - name: SendToLogit - Workflow Started
            if: false
            shell: bash
            env:
              STEP_NAME: "WorkflowStarted"
              LOGIT_API_KEY: ${{secrets.LOGIT_API_KEY}}
              URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              STATUS: "${{ job.status }}"
            run: |
              BASE="$GITHUB_WORKSPACE/.github/logit/base-workflow.json"
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              jq -s \
                --arg step_timestamp "$TS" \
                --arg step_name "${STEP_NAME}" \
                --arg url "${URL}" \
                --arg status "${STATUS}" '
                (.[0] // {}) * {
                 "@timestamp": $step_timestamp,
                 "message": $step_name,
                 "url": {
                   "original": $url
                  },
                 "event": {
                    "outcome": $status,
                    "action": $step_name
                  }
                }' $GITHUB_WORKSPACE/payload_base.json > payload.json

              curl -i  \
                 -H "ApiKey: $LOGIT_API_KEY" \
                 -H "Content-Type: application/json" \
                 -H "LogType: custom" \
                 https://api-uk1.logit.io/v2 \
                 --data-binary @payload.json

          - name: Log in to GHCR
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: github-actions
              password: ${{ secrets.GITHUB_TOKEN }}

          - name: Mirror images from lookup file
            run: |
                echo "Pulling image nginxinc/nginx-unprivileged:1.27.3-alpine3.20"
                docker pull -q "nginxinc/nginx-unprivileged:1.27.3-alpine3.20"
                echo "Tagging nginxinc/nginx-unprivileged:1.27.3-alpine3.20 as ghcr.io/dfe-digital/teacher-services-cloud:nginx-unprivileged-1.27.3-alpine3.20"
                docker tag nginxinc/nginx-unprivileged:1.27.3-alpine3.20 ghcr.io/dfe-digital/teacher-services-cloud:nginx-unprivileged-1.27.3-alpine3.20
                echo "Pushing ghcr.io/dfe-digital/teacher-services-cloud:nginx-unprivileged-1.27.3-alpine3.20"
                docker push -q "ghcr.io/dfe-digital/teacher-services-cloud:nginx-unprivileged-1.27.3-alpine3.20"

          - name: failing step  # This step is intentionally failing to test the failure handling
            continue-on-error: true
            run: |
                set +e
                exit 1  # FAIL THE STEP
                ec=$?
                # Persist first failure details for later steps
                if [ $ec -ne 0 ] && [ -z "${FAIL_EXIT_CODE:-}" ]; then
                  echo "FAIL_EXIT_CODE=$ec" >> "$GITHUB_ENV"
                  echo "FAILED_STEP=build"  >> "$GITHUB_ENV"
                fi
                exit $ec

          - name: SendToLogit - Workflow Completed
            if: ${{ always() }}
            shell: bash
            env:
              STEP_NAME: "WorkflowCompleted - ${{ job.status }}"
              LOGIT_API_KEY: ${{secrets.LOGIT_API_KEY}}
              URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              CONCLUSION: "${{ github.event.workflow.run.conclusion }}"
              STATUS: "${{ job.status }}"
              FAIL_EXIT_CODE: "${{ env.FAIL_EXIT_CODE }}"                # from earlier failing step(s)
              FAILED_STEP: "${{ env.FAILED_STEP }}"
            run: |
              BASE="$GITHUB_WORKSPACE/.github/logit/base-workflow.json"
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

              if [ "${STATUS}" = "failure" ]; then
                # Failure branch — include first failing step and its exit code
                jq -s \
                  --arg step_timestamp "$TS" \
                  --arg step_name "${STEP_NAME}" \
                  --arg url "${URL}" \
                  --arg conclusion "${CONCLUSION:-failure}" \
                  --arg status "${STATUS}" \
                  --arg failed_step "${FAILED_STEP:-unknown}" \
                  --arg exit_code "${FAIL_EXIT_CODE:-unknown}" '
                  (.[0] // {}) * {
                    "@timestamp": $step_timestamp,
                    "message": $step_name,
                    "url": { "original": $url },
                    "event": {
                      "outcome": $status,
                      "action": $step_name,
                      "conclusion": $conclusion,
                      "failure": {
                        "step": $failed_step,
                        "exit_code": $exit_code
                      }
                    }
                  }' "$GITHUB_WORKSPACE/payload_base.json" > payload2.json

              else
                # Success branch — no failure details
                jq -s \
                  --arg step_timestamp "$TS" \
                  --arg step_name "${STEP_NAME}" \
                  --arg url "${URL}" \
                  --arg conclusion "${CONCLUSION:-success}" \
                  --arg status "${STATUS}" '
                  (.[0] // {}) * {
                    "@timestamp": $step_timestamp,
                    "message": $step_name,
                    "url": { "original": $url },
                    "event": {
                      "outcome": $status,
                      "action": $step_name,
                      "conclusion": $conclusion
                    }
                  }' "$GITHUB_WORKSPACE/payload_base.json" > payload2.json
              fi

              curl -i \
                -H "ApiKey: $LOGIT_API_KEY" \
                -H "Content-Type: application/json" \
                -H "LogType: custom" \
                https://api-uk1.logit.io/v2 \
                --data-binary @payload2.json