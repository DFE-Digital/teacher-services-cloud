name: Fix Airbyte LSN

on:
  push:
    branches:
      - feature/fix-airbyte-lsn
  workflow_dispatch:
    inputs:
      namespace:
        description: Kubernetes namespace
        required: true
      cluster:
        description: Cluster name
        required: true
        default: test
        type: choice
        options:
          - test
          - production
      connection-id:
        description: Airbyte connection UUID to reset state for
        required: true
      dry-run:
        description: Dry run — inspect state only, do not delete
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write

env:
  SERVICE_NAME: register
  SERVICE_SHORT: rtt

jobs:
  fix-lsn:
    name: Fix Airbyte LSN state
    runs-on: ubuntu-latest
    environment:
      name: test
    env:
      CLUSTER: ${{ github.event_name == 'push' && 'test' || inputs.cluster }}
      NAMESPACE: ${{ github.event_name == 'push' && 'bat-qa' || inputs.namespace }}
      DRY_RUN: ${{ github.event_name == 'push' && 'true' || inputs.dry-run }}
      CONNECTION_ID: ${{ github.event_name == 'push' && 'dry-run-test' || inputs.connection-id }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Fix Airbyte LSN state
      uses: DFE-Digital/github-actions/fix-airbyte-lsn@feature/airbyte-replication
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        airbyte-app-name: ${{ env.SERVICE_NAME }}-${{ env.NAMESPACE }}-worker
        namespace: ${{ env.NAMESPACE }}
        cluster: ${{ env.CLUSTER }}
        connection-id: ${{ env.CONNECTION_ID }}
        dry-run: ${{ env.DRY_RUN }}