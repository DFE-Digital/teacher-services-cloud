apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: #ENVIRONMENT#.#DNS_ZONE_NAME#
spec:
  ingressClassName: nginx
  rules:
  - host: #ENVIRONMENT#.#DNS_ZONE_NAME#
    http:
      paths:
      - pathType: ImplementationSpecific
        backend:
          service:
            name: #SERVICE_NAME#-#ENVIRONMENT#
            port:
              number: 80
